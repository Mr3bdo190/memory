name: Generate and Push Flutter Files

on:
  push:
    branches: [ main ]

jobs:
  generate:
    runs-on: ubuntu-latest
    permissions:
      contents: write # علشان الـ Action يقدر يرفع الملفات للريبو
    steps:
      - uses: actions/checkout@v4
      
      - uses: subosito/flutter-action@v2
        with:
          channel: 'stable'
          
      - name: Generate Android Files
        run: flutter create . --platforms android

      - name: Commit and Push back
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add android/
          git commit -m "Auto-generated Flutter Android files" || echo "No changes to commit"
          git push
